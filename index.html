<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Намаз">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://googleapis.com">
<link href="https://googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<title>Намаз</title>
<style>
:root{
  --c:#00e5ff; --r:#ff1744; --a:#ffab00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;font-family:'Rajdhani',sans-serif;overflow:hidden;color:#fff;}

body{display:flex;align-items:center;justify-content:center;}
#app{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 16px;
  gap:0;
}

/* Обычная дата: размер увеличен в 3 раза, яркость на максимум */
#datebox{
  font-size:clamp(23px,9vw,10px);font-weight:600;letter-spacing:4px;
  text-transform:uppercase;text-align:center;color:rgba(255,255,255,0.60);
  margin-bottom:8px;
}
#hijri-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 25px;
  margin-bottom: 12px;
}
/* Исламская дата: размер увеличен в 3 раза, яркость поднята до 95% */
#hijribox{
  font-size:clamp(20px,7.8vw,10px);font-weight:600;letter-spacing:2px;
  text-align:center;color:rgba(255,255,255,0.60);
}
/* Стрелочки увеличены под масштаб новой даты */
.hj-btn {
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.4);
  font-size: clamp(36px, 8vw, 48px);
  cursor: pointer;
  padding: 0 15px;
  user-select: none;
  transition: color 0.2s;
}
.hj-btn:active {
  color: var(--c);
}
#current-time{
  font-family:'Orbitron',monospace;font-size:clamp(26px,6.5vw,48px);font-weight:700;
  letter-spacing:4px;text-align:center;font-variant-numeric:tabular-nums;
  color:var(--c);text-shadow:0 0 14px var(--c),0 0 36px rgba(0,229,255,0.2);
  margin-bottom:16px;
}

#prayer-name{
  font-family:'Orbitron',monospace;font-size:clamp(16px,5.5vw,40px);font-weight:700;
  letter-spacing:4px;text-align:center;transition:color .5s,text-shadow .5s;
  margin-bottom:4px;
}
#timer{
  font-family:'Orbitron',monospace;font-size:clamp(54px,15vw,100px);font-weight:900;
  letter-spacing:2px;line-height:1;text-align:center;font-variant-numeric:tabular-nums;
  transition:color .5s,text-shadow .5s;
  margin-bottom:20px;
}

#prayer-name.green{color:var(--c);text-shadow:0 0 12px rgba(0,229,255,0.5);}
#timer.green{color:var(--c);text-shadow:0 0 22px var(--c),0 0 55px rgba(0,229,255,0.25);}

#prayer-name.red{color:var(--r);text-shadow:0 0 12px rgba(255,23,68,0.6);}
#timer.red{color:var(--r);text-shadow:0 0 22px var(--r),0 0 55px rgba(255,23,68,0.3);animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

/* Bottom row */
#bottom-row{display:flex;gap:clamp(6px,2vw,18px);align-items:flex-start;justify-content:center;flex-wrap:wrap;}
.pi{display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.70;transition:opacity .3s;min-width:40px;padding:4px 6px;position:relative;}
.pi::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--c);transition:width .3s;}
.pi.active{opacity:1;}.pi.active::after{width:80%;}

/* Темные (прошедшие) молитвы сделаны ярче на 50% (было 0.08, стало 0.58) */
.pi.done{opacity:0.70;}

.pi-name{font-size:clamp(9px,2.2vw,13px);color:rgba(255,255,255,0.45);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.pi-time{font-family:'Orbitron',monospace;font-size:clamp(12px,3.2vw,18px);color:rgba(255,255,255,0.5);font-weight:700;font-variant-numeric:tabular-nums;}
.pi.active .pi-name{color:var(--c);}.pi.active .pi-time{color:var(--c);text-shadow:0 0 8px rgba(0,229,255,0.4);}
.pi.sr .pi-time{color:var(--a);}.pi.sr.active .pi-time{color:var(--a);text-shadow:0 0 8px rgba(255,171,0,0.4);}.pi.sr.active::after{background:var(--a);}
.pi.sr .pi-name{color:rgba(255,171,0,0.4);}.pi.sr.active .pi-name{color:var(--a);}
</style>
</head>
<body>
<div id="app">
  <div id="hijri-container">
    <button class="hj-btn" onclick="adjustHijri(-1)">‹</button>
    <div id="hijribox"></div>
    <button class="hj-btn" onclick="adjustHijri(1)">›</button>
  </div>
  <div id="datebox"></div>
  <div id="current-time">--:--:--</div>
  <div id="prayer-name" class="green">—</div>
  <div id="timer" class="green">--:--</div>
  <div id="bottom-row"></div>
</div>

const NAMES=['Фаджр','Зухр','Аср','Магриб','Иша'];
const KEYS=['F','Z','A','M','I'];
const WINS={"Фаджр":30*60,"Магриб":7*60};
const DEFAULT_WIN=15*60;
const DUHA_DELAY=25*60;

function pad(n){return String(n).padStart(2,'0');}

const HIJRI_MONTHS=['Мухаррам','Сафар','Раби аль-Авваль','Раби ас-Сани',
  'Джумада аль-Уля','Джумада ас-Сания','Раджаб','Шаабан',
  'Рамадан','Шавваль','Зуль-Каада','Зуль-Хиджа'];

let HIJRI_OFFSET_DAYS = parseInt(localStorage.getItem('hijriOffset') || '-1');

function adjustHijri(amount) {
  HIJRI_OFFSET_DAYS += amount;
  localStorage.setItem('hijriOffset', HIJRI_OFFSET_DAYS);
  const now = new Date();
  document.getElementById('hijribox').textContent = fmtHijri(now);
}

function gregorianToHijri(d, autoShiftMaghrib = false){
  let adjustedTime = d.getTime();
  adjustedTime += (HIJRI_OFFSET_DAYS * 24 * 60 * 60 * 1000);
  
  if (autoShiftMaghrib) {
    const prayers = getPrayers(d);
    if (prayers && prayers[3]) {
      const maghribTime = prayers[3].time.getTime();
      if (d.getTime() >= maghribTime) {
        adjustedTime += (1 * 24 * 60 * 60 * 1000);
      }
    }
  }

  const adjustedDate = new Date(adjustedTime);
  const gY=adjustedDate.getFullYear(),gM=adjustedDate.getMonth()+1,gD=adjustedDate.getDate();
  
  const JD=Math.floor((1461*(gY+4800+Math.floor((gM-14)/12)))/4)
    +Math.floor((367*(gM-2-12*Math.floor((gM-14)/12)))/12)
    -Math.floor((3*Math.floor((gY+4900+Math.floor((gM-14)/12))/100))/4)
    +gD-32075;
  let l=JD-1948440+10632;
  const n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  const j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)
    +Math.floor(l/5670)*Math.floor((43*l)/15238);
  l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)
    -Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  const hM=Math.floor((24*l)/709);
  const hD=l-Math.floor((709*hM)/24);
  const hY=30*n+j-30;
  return{day:hD,month:hM,year:hY};
}

function fmtHijri(d){
  const h=gregorianToHijri(d, true);
  return h.day+' '+HIJRI_MONTHS[h.month-1]+' '+h.year+' г.х.';
}

function getKey(d){return pad(d.getMonth()+1)+'-'+pad(d.getDate());}

function getPrayers(date){
  const row=P[getKey(date)]||P['02-28'];
  return KEYS.map((c,i)=>{const[h,m]=row[c].split(':').map(Number);const t=new Date(date);t.setHours(h,m,0,0);return{name:NAMES[i],time:t};});
}

function getSunrise(date){
  const key=getKey(date);
  const s=SR[key]||SR['02-28'];
  const[h,m]=s.split(':').map(Number);
  const t=new Date(date);t.setHours(h,m,0,0);return t;
}

function compute(){
  const now=new Date(),ms=now.getTime(),prayers=getPrayers(now);
  const sunrise=getSunrise(now);
  const srMs=sunrise.getTime(),duhaMs=srMs+DUHA_DELAY*1000;
  for(let i=0;i<prayers.length;i++){
    const pms=prayers[i].time.getTime(),diff=ms-pms;
    const win=(WINS[prayers[i].name]||DEFAULT_WIN);
    if(diff>=0&&diff<win*1000)
      return{state:'active',prayers,cur:prayers[i],nxt:prayers[i+1]||null,rem:win-Math.floor(diff/1000),sunrise};
    if(pms>ms){
      if(prayers[i].name==='Зухр'){
        if(ms<srMs)
          return{state:'countdown',prayers,nxt:{name:'Восход',time:sunrise},rem:Math.floor((srMs-ms)/1000),sunrise};
        if(ms<duhaMs)
          return{state:'duha',prayers,rem:Math.floor((duhaMs-ms)/1000),sunrise};
      }
      return{state:'countdown',prayers,nxt:prayers[i],rem:Math.floor((pms-ms)/1000),sunrise};
    }
  }
  const tom=new Date(now);tom.setDate(tom.getDate()+1);
  const fajr=getPrayers(tom)[0];
  return{state:'countdown',prayers,nxt:fajr,rem:Math.floor((fajr.time.getTime()-ms)/1000),sunrise};
}

function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?pad(h)+':'+pad(m)+':'+pad(sec):pad(m)+':'+pad(sec);}
function fmtT(d){return pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtDate(d){
  const W=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'],
        M=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return W[d.getDay()]+' '+d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();
}

const $ct=document.getElementById('current-time');
const $t=document.getElementById('timer');
const $n=document.getElementById('prayer-name');
const $b=document.getElementById('bottom-row');
const $dt=document.getElementById('datebox');
const $hj=document.getElementById('hijribox');

function renderBottom(prayers,nxt,cur,sunrise){
  $b.innerHTML='';const ms=Date.now();
  const items=[prayers[0],{name:'Восход',time:sunrise,isSr:true},...prayers.slice(1)];
  items.forEach(p=>{
    const d=document.createElement('div');d.className='pi';
    if(p.isSr)d.classList.add('sr');
    const isA=cur&&cur.name===p.name;
    const isN=nxt&&nxt.name===p.name&&!cur;
    const isDone=p.time.getTime()<ms&&!isA;
    if(isA||isN)d.classList.add('active');
    if(isDone&&!isA)d.classList.add('done');
    d.innerHTML='<span class="pi-name">'+p.name+'</span><span class="pi-time">'+fmtT(p.time)+'</span>';
    $b.appendChild(d);
  });
}

function tick(){
  const now=new Date();
  $ct.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  $dt.textContent=fmtDate(now);
  $hj.textContent=fmtHijri(now);
  const s=compute();
  if(s.state==='active'){
    $t.textContent=fmt(s.rem);$t.className='red';
    $n.textContent=s.cur.name.toUpperCase();$n.className='red';
    renderBottom(s.prayers,null,s.cur,s.sunrise);
  } else if(s.state==='duha'){
    $t.textContent=fmt(s.rem);$t.className='red';
    $n.textContent='ДУХА';$n.className='red';
    renderBottom(s.prayers,null,null,s.sunrise);
  } else {
    $t.textContent=fmt(s.rem);$t.className='green';
    $n.textContent=s.nxt?s.nxt.name.toUpperCase():'';$n.className='green';
    renderBottom(s.prayers,s.nxt,null,s.sunrise);
  }
}

tick();setInterval(tick,1000);
document.addEventListener('click',(e)=>{
  if(e.target.classList.contains('hj-btn')) return;
  if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();
});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
