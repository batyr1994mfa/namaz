#app {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(20px, 5vh, 40px) 12px;
  gap: 15px;
  overflow: hidden;
  background: transparent !important;
  position: relative;
}

/* Чёрный фейд сверху и снизу — перекрывает края панелей */
#app::before,
#app::after {
  content: '';
  position: fixed;
  left: 0;
  right: 0;
  height: clamp(80px, 18vh, 160px);
  pointer-events: none;
  z-index: 10;
}
#app::before {
  top: 0;
  background: linear-gradient(to bottom, #000000 0%, rgba(0,0,0,0.85) 40%, rgba(0,0,0,0.4) 70%, transparent 100%);
}
#app::after {
  bottom: 0;
  background: linear-gradient(to top, #000000 0%, rgba(0,0,0,0.85) 40%, rgba(0,0,0,0.4) 70%, transparent 100%);
}

/* ── iOS 26 Liquid Glass ───────────────────────────────────────────── */
/* Почти прозрачное стекло, сильный blur, яркий блик сверху           */

.glass-island {
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.015) !important;
  backdrop-filter: saturate(200%) blur(40px) brightness(1.12) !important;
  -webkit-backdrop-filter: saturate(200%) blur(40px) brightness(1.12) !important;
  border: 1px solid rgba(255, 255, 255, 0.28) !important;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.55),   /* блик сверху */
    inset 0 -1px 0 rgba(255,255,255,0.08),
    inset 1px 0 0 rgba(255,255,255,0.10),
    0 20px 60px rgba(0,0,0,0.35),
    0 2px 8px rgba(0,0,0,0.20) !important;
  display: flex;
  width: 100%;
  max-width: 480px;
}

.row-item {
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.015) !important;
  backdrop-filter: saturate(200%) blur(40px) brightness(1.12) !important;
  -webkit-backdrop-filter: saturate(200%) blur(40px) brightness(1.12) !important;
  border: 1px solid rgba(255, 255, 255, 0.28) !important;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.55),
    inset 0 -1px 0 rgba(255,255,255,0.08),
    inset 1px 0 0 rgba(255,255,255,0.10),
    0 20px 60px rgba(0,0,0,0.35),
    0 2px 8px rgba(0,0,0,0.20) !important;
  padding: 8px 14px;
  display: flex;
  height: 48px;
}

.frame-box {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: transparent !important;
  backdrop-filter: none !important;
  border: none !important;
  box-shadow: none !important;
}

.island-top-row {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  justify-content: space-between;
  gap: 8px;
  width: 100%;
}

.island-top-time {
  flex-direction: column;
  align-items: center;
  align-self: stretch;
  padding: 8px 16px;
  width: auto !important;
  flex: 0 0 auto;
}

.island-address {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 14px;
  flex: 1;
  text-align: center;
}

#address-label {
  font-size: clamp(9px, 2.3vw, 12px);
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: -apple-system, system-ui, sans-serif;
  font-weight: 500;
  line-height: 1.1;
  margin-bottom: 2px;
}

#address-name {
  font-size: clamp(11px, 2.8vw, 15px);
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0;
  font-family: -apple-system, system-ui, sans-serif;
  white-space: nowrap;
}

.island-middle-row {
  display: flex !important;
  flex-direction: row-reverse !important;
  justify-content: space-between;
  align-items: center;
  align-self: stretch;
  width: 100% !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  gap: 8px;
}



.item-address {
  align-items: center;
  justify-content: center;
  text-align: left;
  flex: 0 0 auto;
  white-space: nowrap;
}

#address-text {
  font-size: clamp(10px, 2.4vw, 13px);
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0;
  font-family: -apple-system, system-ui, sans-serif;
}

.hijri-control-box {
  display: flex;
  align-items: center;
  flex: 0 0 auto;
  gap: 5px;
}

.item-date {
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  text-align: right;
  flex: 1;
}

.glass-btn { display: none; }

.island-center-timer {
  flex-direction: column;
  align-items: center;
  align-self: center;
  width: 100%;
  padding: 12px 20px;
  margin-top: 0 !important;
}

#current-time {
  font-size: clamp(28px, 7.5vw, 48px);
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -1px;
  text-align: center;
  font-family: -apple-system, system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
  line-height: 1.05;
}

#hijri-date {
  font-size: clamp(13px, 3.3vw, 20px);
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0;
  font-family: -apple-system, system-ui, sans-serif;
  line-height: 1.1;
  white-space: nowrap;
}

#datebox {
  font-size: clamp(10px, 2.3vw, 13px);
  color: rgba(255,255,255,0.4);
  font-weight: 400;
  letter-spacing: 0;
  white-space: nowrap;
  margin-top: 1px;
  line-height: 1.1;
}

.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  margin: 6px 0;
}

#status-label {
  font-size: clamp(9px, 2.5vw, 12px);
  color: rgba(255,255,255,0.5) !important;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  text-align: center;
  font-family: -apple-system, system-ui, sans-serif;
  font-weight: 500;
}

#prayer-name {
  font-size: clamp(24px, 7.5vw, 46px);
  font-weight: 700;
  letter-spacing: -0.5px;
  text-align: center;
  transition: color .4s;
  margin-top: 1px;
  font-family: -apple-system, system-ui, sans-serif;
  line-height: 1;
}

#timer {
  font-size: clamp(44px, 12vw, 76px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: .95;
  text-align: center;
  font-family: -apple-system, system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
  transition: color .4s;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}

/* iOS system green / red */
#timer.green, #prayer-name.green { color: #30d158; }
#timer.red,   #prayer-name.red   { color: #ff453a; }

#prayer-time-display { display:none; }

#bottom-row {
  display: flex !important;
  flex-direction: row !important;
  gap: clamp(4px, 1.5vw, 10px);
  align-items: center;
  justify-content: center;
  flex-wrap: nowrap;
  padding: 16px 12px;
  width: 100%;
  max-width: 480px;
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.015) !important;
  backdrop-filter: saturate(200%) blur(40px) brightness(1.12) !important;
  -webkit-backdrop-filter: saturate(200%) blur(40px) brightness(1.12) !important;
  border: 1px solid rgba(255, 255, 255, 0.28) !important;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.55),
    inset 0 -1px 0 rgba(255,255,255,0.08),
    0 20px 60px rgba(0,0,0,0.35),
    0 2px 8px rgba(0,0,0,0.20) !important;
}

.pi { display:flex; flex-direction:column; align-items:center; gap:1px; opacity:1 !important; transition:opacity .3s; flex:1; min-width:0; }
.pi.active { opacity:1; }
.pi.done   { opacity:.3; }

.pi-name {
  font-size: clamp(8px, 2.2vw, 13px);
  color: rgba(255,255,255,0.65) !important;
  letter-spacing: 0;
  text-transform: uppercase;
  font-family: -apple-system, system-ui, sans-serif;
  font-weight: 500;
  white-space: nowrap;
}
.pi-time {
  font-size: clamp(12px, 3.1vw, 18px);
  color: #ffffff !important;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-family: -apple-system, system-ui, sans-serif;
}

.pi.active .pi-name { color: #ff453a !important; }
.pi.active .pi-time { color: #ff453a !important; }

/* iOS yellow для восхода */
.pi.sr .pi-name { color: #ffd60a !important; }
.pi.sr .pi-time { color: #ffd60a !important; }

@media (orientation: landscape) {
  #app {
    padding: 4px 12px;
    gap: 4px;
  }
  /* Фейды почти убираем чтобы панели не перекрывались */
  #app::before, #app::after {
    height: 28px;
  }
  #app::before {
    background: linear-gradient(to bottom, #000000 0%, transparent 100%);
  }
  #app::after {
    background: linear-gradient(to top, #000000 0%, transparent 100%);
  }
  .frame-box {
    gap: 4px;
  }
  #top-calendar-row {
    padding: 4px 12px;
    margin-bottom: 0;
  }
  #bottom-row {
    padding: 6px 12px;
  }
  .island-center-timer {
    padding: 6px 16px;
  }
  #timer {
    font-size: clamp(30px, 7.5vw, 50px);
  }
  #prayer-name {
    font-size: clamp(16px, 4.5vw, 28px);
  }
  #current-time {
    font-size: clamp(18px, 4.5vw, 30px);
  }
}

let hijriOffset = parseInt(localStorage.getItem('hijri_offset')) || 0;

function adjustHijri(days) {
  hijriOffset += days;
  localStorage.setItem('hijri_offset', hijriOffset);
  tick(); 
}

const HIJRI_MONTHS = [
  'Мухаррам','Сафар','Раби аль-Авваль','Раби аль-Ахир',
  'Джумада I','Джумада II','Раджаб','Шаабан',
  'Рамадан','Шавваль','Зуль-Каада','Зуль-Хиджа'
];

function toHijri(date) {
  const targetDate = new Date(date.getTime());
  targetDate.setDate(targetDate.getDate() + hijriOffset);

  const y = targetDate.getFullYear(), m = targetDate.getMonth()+1, d = targetDate.getDate();
  const a = Math.floor((14 - m) / 12);
  const yy = y + 4800 - a, mm = m + 12*a - 3;
  let jdn = d + Math.floor((153*mm+2)/5) + 365*yy + Math.floor(yy/4) - Math.floor(yy/100) + Math.floor(yy/400) - 32045;
  let l = jdn - 1948440 + 10632;
  const n = Math.floor((l-1)/10631);
  l = l - 10631*n + 354;
  const j = Math.floor((10985-l)/5316) * Math.floor(50*l/17719) + Math.floor(l/5670) * Math.floor(43*l/15238);
  l = l - Math.floor((30-j)/15)*Math.floor(17719*j/50) - Math.floor(j/16)*Math.floor(15238*j/43) + 29;
  const hMonth = Math.floor(24*l/709);
  const hDay   = l - Math.floor(709*hMonth/24);
  const hYear  = 30*n + j - 30;
  return { day: hDay, month: hMonth, year: hYear };
}

function fmtHijri(date) {
  const h = toHijri(date);
  return h.day + ' ' + HIJRI_MONTHS[h.month-1].toUpperCase() + ' ' + h.year;
}

const NAMES=['Фаджр','Зухр','Аср','Магриб','Иша'];
const KEYS=['F','Z','A','M','I'];
const WINS={"Фаджр":30*60,"Магриб":7*60};
const DEFAULT_WIN=15*60;
const DUHA_DELAY=25*60;

function pad(n){return String(n).padStart(2,'0');}
function getKey(d){return pad(d.getMonth()+1)+'-'+pad(d.getDate());}

function getPrayers(date){
  const row=P[getKey(date)]||P['02-28'];
  return KEYS.map((c,i)=>{const[h,m]=row[c].split(':').map(Number);const t=new Date(date);t.setHours(h,m,0,0);return{name:NAMES[i],time:t};});
}
function getSunrise(date){
  const s=SR[getKey(date)]||SR['02-28'];
  const[h,m]=s.split(':').map(Number);
  const t=new Date(date);t.setHours(h,m,0,0);return t;
}

function compute(){
  const now=new Date(),ms=now.getTime(),prayers=getPrayers(now);
  const sunrise=getSunrise(now);
  const srMs=sunrise.getTime(),duhaMs=srMs+DUHA_DELAY*1000;
  for(let i=0;i<prayers.length;i++){
    const pms=prayers[i].time.getTime(),diff=ms-pms;
    const win=(WINS[prayers[i].name]||DEFAULT_WIN);
    if(diff>=0&&diff<win*1000)
      return{state:'active',prayers,cur:prayers[i],nxt:prayers[i+1]||null,rem:win-Math.floor(diff/1000),sunrise};
    if(pms>ms){
      if(prayers[i].name==='Зухр'){
        if(ms<srMs) return{state:'countdown',prayers,nxt:{name:'Восход',time:sunrise},rem:Math.floor((srMs-ms)/1000),sunrise};
        if(ms<duhaMs) return{state:'duha',prayers,rem:Math.floor((duhaMs-ms)/1000),sunrise};
      }
      return{state:'countdown',prayers,nxt:prayers[i],rem:Math.floor((pms-ms)/1000),sunrise};
    }
  }
  const tom=new Date(now);tom.setDate(tom.getDate()+1);
  const fajr=getPrayers(tom)[0]; 
  return{state:'countdown',prayers,nxt:fajr,rem:Math.floor((fajr.time.getTime()-ms)/1000),sunrise};
}

function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?pad(h)+':'+pad(m)+':'+pad(sec):pad(m)+':'+pad(sec);}
function fmtT(d){return pad(d.getHours())+':'+pad(d.getMinutes());}
function fmtDate(d){
  const W=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const M=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear()+' \u2022 '+W[d.getDay()];
}

const $ct=document.getElementById('current-time');
const $hj=document.getElementById('hijri-date');
const $dt = null;
const $t=document.getElementById('timer');
const $n=document.getElementById('prayer-name');
const $pt=document.getElementById('prayer-time-display');
const $st=document.getElementById('status-label');
const $b=document.getElementById('bottom-row');

function renderBottom(prayers,nxt,cur,sunrise){
  $b.innerHTML='';const ms=Date.now();
  const items=[prayers[0],{name:'Восход',time:sunrise,isSr:true},...prayers.slice(1)];
  items.forEach(p=>{
    const d=document.createElement('div');d.className='pi';
    if(p.isSr)d.classList.add('sr');
    const isA=cur&&cur.name===p.name;
    const isN=nxt&&nxt.name===p.name&&!cur;
    const isDone=p.time.getTime()<Date.now()&&!isA;
    if(isA||isN)d.classList.add('active');
    if(isDone&&!isA)d.classList.add('done');
    d.innerHTML='<span class="pi-name">'+p.name+'</span><span class="pi-time">'+fmtT(p.time)+'</span>';
    $b.appendChild(d);
  });
}

function tick(){
  const now=new Date();
  $ct.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  $hj.textContent=fmtHijri(now);
if ($dt) { $dt.textContent = fmtDate(now); }
  const s=compute();

  if(s.state==='active'){
    $t.textContent=fmt(s.rem);$t.className='red';
    $n.textContent=s.cur.name.toUpperCase();$n.className='red';
    $st.textContent='';
    $pt.textContent=fmtT(s.cur.time);
    renderBottom(s.prayers,null,s.cur,s.sunrise);
  } else if(s.state==='duha'){
    $t.textContent=fmt(s.rem);$t.className='red';
    $n.textContent='ДУХА';$n.className='red';
    $st.textContent='';
    $pt.textContent='';
    renderBottom(s.prayers,null,null,s.sunrise);
  } else {
    $t.textContent=fmt(s.rem);$t.className='green';
    $n.textContent=s.nxt?s.nxt.name.toUpperCase():'';$n.className='green';
    $st.textContent='';
    $pt.textContent=s.nxt?fmtT(s.nxt.time):'';
    renderBottom(s.prayers,s.nxt,null,s.sunrise);
  }
}

tick();setInterval(tick,1000);
document.addEventListener('click',(e)=>{
  if(e.target.tagName==='BUTTON') return; 
  if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();
});

  }

  // 2. Создание и добавление верхнего календаря
  const frameBox = document.querySelector('.frame-box');
  if (frameBox) {
    const topRow = document.createElement('div');
    topRow.id = 'top-calendar-row';
    
    const daysOfWeek = ['ВС', 'ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
    // Порядок дней: с Понедельника по Воскресенье
    const orderedIndices = [1, 2, 3, 4, 5, 6, 0]; 
    
    orderedIndices.forEach(idx => {
      const dayDiv = document.createElement('div');
      dayDiv.className = 'cal-day';
      dayDiv.setAttribute('data-day-idx', idx);
      dayDiv.innerHTML = `<span class="pi-name">${daysOfWeek[idx]}</span>`;
      topRow.appendChild(dayDiv);
    });

    // Островок матового стекла для АКБ
    const batDiv = document.createElement('div');
    batDiv.className = 'cal-day battery-box';
    batDiv.innerHTML = '<span class="pi-name"></span><span class="pi-time" id="ext-bat-val">...</span>';
    topRow.appendChild(batDiv);

    // Вставляем календарь на самый верх .frame-box
    frameBox.insertBefore(topRow, frameBox.firstChild);
  }

  // Аудио-контекст для генерации пикания
  let audioCtx = null;
  function beep(freq = 880, duration = 150) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration / 1000);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration / 1000);
    } catch(e) { console.log("Audio play blocked or unsupported"); }
  }

  function playThreeBeeps() {
    beep(880, 150);
    setTimeout(() => beep(880, 150), 300);
    setTimeout(() => beep(880, 150), 600);
  }

  document.addEventListener('click', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: false });

  // 3. Логика обновления календаря, батареи и детектора начала молитв
  let lastState = null;
  let lastPrayerName = null;

  function updateExtensions() {
    const now = new Date();
    const currentDayIdx = now.getDay();

    // Обновление подсветки текущего дня
    document.querySelectorAll('.cal-day[data-day-idx]').forEach(el => {
      const idx = parseInt(el.getAttribute('data-day-idx'));
      if (idx === currentDayIdx) {
        el.classList.add('current');
      } else {
        el.classList.remove('current');
      }
    });

    // Запрос уровня заряда батареи API
    if (navigator.getBattery) {
      navigator.getBattery().then(battery => {
        const batValEl = document.getElementById('ext-bat-val');
        if (batValEl) {
          batValEl.textContent = Math.round(battery.level * 100) + '%';
        }
      }).catch(() => {});
    } else {
      const batValEl = document.getElementById('ext-bat-val');
      if (batValEl) batValEl.textContent = '100%';
    }

    // Проверка наступления намаза на основе вашей функции compute()
    if (typeof compute === 'function') {
      const s = compute();
      if (s && s.state === 'active' && s.cur) {
        if (lastState !== 'active' || lastPrayerName !== s.cur.name) {
          playThreeBeeps();
        }
        lastPrayerName = s.cur.name;
      } else {
        lastPrayerName = null;
      }
      if (s) lastState = s.state;
    }
  }

  // Запуск цикла апдейтов
  setInterval(updateExtensions, 1000);
  setTimeout(updateExtensions, 100);
})();
</script>
