#app {

}

}

/* ── iPhone Frosted Glass ── */
.glass-island {
  border-radius:22px;
  background:rgba(255,255,255,0.01) !important;
  backdrop-filter:blur(28px) saturate(180%) brightness(1.1) !important;
  -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(1.1) !important;
  border:1px solid rgba(255,255,255,0.40) !important;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.70),
    inset 0 -1px 0 rgba(255,255,255,0.06),
    inset 1px 0 0 rgba(255,255,255,0.08),
    0 8px 32px rgba(0,0,0,0.18),
    0 2px 8px rgba(0,0,0,0.12) !important;
  display:flex; width:100%; max-width:480px;
}
.row-item {
  border-radius:22px;
  background:rgba(255,255,255,0.01) !important;
  backdrop-filter:blur(28px) saturate(180%) brightness(1.1) !important;
  -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(1.1) !important;
  border:1px solid rgba(255,255,255,0.40) !important;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.70),
    inset 0 -1px 0 rgba(255,255,255,0.06),
    inset 1px 0 0 rgba(255,255,255,0.08),
    0 8px 32px rgba(0,0,0,0.18),
    0 2px 8px rgba(0,0,0,0.12) !important;
  padding:8px 14px; display:flex; height:48px;
}
.frame-box {
  width:100%; max-width:480px; display:flex; flex-direction:column; gap:12px;
  background:transparent !important; backdrop-filter:none !important;
  border:none !important; box-shadow:none !important;
}
.island-top-row {
  display:flex; flex-direction:row; align-items:stretch;
  justify-content:space-between; gap:8px; width:100%;
}
.island-top-time {
  flex-direction:column; align-items:center; align-self:stretch;
  padding:8px 16px; width:auto !important; flex:0 0 auto;
}
.island-address {
  flex-direction:column; align-items:stretch; justify-content:center;
  padding:6px 14px; flex:1; gap:3px;
}
.addr-date-row {
  display:flex; flex-direction:row; align-items:center;
  justify-content:space-between; width:100%; gap:8px;
}
.addr-addr-row { display:flex; flex-direction:row; align-items:center; gap:4px; }
#address-label {
  font-size:clamp(9px,2.3vw,12px); color:rgba(255,255,255,0.4);
  letter-spacing:0.5px; text-transform:uppercase;
  font-family:-apple-system,system-ui,sans-serif; font-weight:500;
  line-height:1.1; margin-bottom:2px;
}
#address-name {
  font-size:clamp(11px,2.8vw,15px); font-weight:600; color:#ffffff;
  font-family:-apple-system,system-ui,sans-serif; white-space:nowrap;
}
.island-middle-row {
  display:flex !important; flex-direction:row-reverse !important;
  justify-content:space-between; align-items:center; align-self:stretch;
  width:100% !important; background:transparent !important; border:none !important;
  box-shadow:none !important; backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important; gap:8px;
}
.item-address {
  align-items:center; justify-content:center; text-align:left;
  flex:0 0 auto; white-space:nowrap;
}
#address-text {
  font-size:clamp(10px,2.4vw,13px); font-weight:600; color:#ffffff;
  font-family:-apple-system,system-ui,sans-serif;
}
.hijri-control-box { display:flex; align-items:center; flex:0 0 auto; gap:5px; }
.item-date { flex-direction:column; align-items:flex-end; justify-content:center; text-align:right; flex:1; }
.glass-btn {
  display:flex; align-items:center; justify-content:center;
  width:19px; height:19px; border-radius:6px;
  background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.35);
  color:#fff; font-size:19px; line-height:1; cursor:pointer;
  padding:0; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  text-shadow:0 1px 2px rgba(0,0,0,0.7);
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
  transition:background 0.15s;
  flex-shrink:0;
}
.glass-btn:active { background:rgba(255,255,255,0.32); }
.island-center-timer {
  flex-direction:column; align-items:center; align-self:center;
  width:100%; padding:12px 20px; margin-top:0 !important;
}
#current-time {
  font-size:clamp(14px,11vh,10px); font-weight:700; color:#ffffff;
  letter-spacing:-1px; text-align:center;
  font-family:-apple-system,system-ui,sans-serif;
  font-variant-numeric:tabular-nums; line-height:1.05;
}
/* Исправленный стиль для увеличения цифры исламского календаря */
.hijri-day-num {
  font-size: clamp(16px, 8vw, 26px) !important; /* Увеличивает только число */
  font-weight: 700 !important;                     /* Делает число более жирным */
  color: #E4FF30 !important;                       /* Золотистый цвет как у обычного календаря */
  display: inline-block !important;                /* Чтобы корректно применились размеры */
  margin-right: 3px !important;                    /* Отступ от текста месяца */
}
#hijri-date {
  font-size:clamp(11px,6vw,11px); font-weight:600; color:rgba(255,255,255,1);
  font-family:-apple-system,system-ui,sans-serif; line-height:1.1;
  white-space:nowrap; text-align:right;
}
#datebox {
  font-size:clamp(10px,2.3vw,13px); color:rgba(255,255,255,0.4); font-weight:400;
  white-space:nowrap; margin-top:1px; line-height:1.1;
}
.divider {
  width:100%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  margin:6px 0;
}
#status-label {
  font-size:clamp(9px,2.5vw,12px); color:rgba(255,255,255,0.5) !important;
  letter-spacing:0.5px; text-transform:uppercase; text-align:center;
  font-family:-apple-system,system-ui,sans-serif; font-weight:500;
}
#prayer-name {
  font-size:clamp(24px,7.5vw,46px); font-weight:700; letter-spacing:-0.5px;
  text-align:center; transition:color .4s; margin-top:1px;
  font-family:-apple-system,system-ui,sans-serif; line-height:1;
}
#timer {
  font-size:clamp(24px,50vw,70px); font-weight:700; letter-spacing:-2px;
  line-height:.95; text-align:center; font-family:-apple-system,system-ui,sans-serif;
  font-variant-numeric:tabular-nums; transition:color .4s;
  width:100%; display:flex; align-items:center; justify-content:center; margin-top:2px;
}
#timer.green { color:#E4FF30; text-shadow:0 2.6px 7.8px rgba(0,0,0,0.78),0 5.2px 15.6px rgba(0,0,0,0.52); }
#prayer-name.green { color:#E4FF30; text-shadow:0 2.6px 7.8px rgba(0,0,0,0.78),0 5.2px 15.6px rgba(0,0,0,0.52); }
#timer.red,#prayer-name.red { color:#ff453a; text-shadow:0 2.6px 7.8px rgba(0,0,0,0.78),0 5.2px 15.6px rgba(0,0,0,0.52); }
#prayer-time-display { display:none; }
#bottom-row {
  display:flex !important; flex-direction:row !important;
  gap:clamp(4px,1.5vw,10px); align-items:center; justify-content:center;
  flex-wrap:nowrap; padding:16px 12px; width:100%; max-width:480px;
  border-radius:22px;
  background:rgba(255,255,255,0.01) !important;
  backdrop-filter:blur(28px) saturate(180%) brightness(1.1) !important;
  -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(1.1) !important;
  border:1px solid rgba(255,255,255,0.40) !important;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.70),
    inset 0 -1px 0 rgba(255,255,255,0.06),
    0 8px 32px rgba(0,0,0,0.18),
    0 2px 8px rgba(0,0,0,0.12) !important;
}
.pi { display:flex; flex-direction:column; align-items:center; gap:1px; opacity:1 !important; transition:opacity .3s; flex:1; min-width:0; }
.pi.active { opacity:1; }
.pi.done { opacity:.3; }
.pi-name {
  font-size:clamp(11px,3vw,18px); color:rgba(255,255,255,0.65) !important;
  text-transform:uppercase; font-family:-apple-system,system-ui,sans-serif;
  font-weight:500; white-space:nowrap;
}
.pi-time {
  font-size:clamp(16px,4.2vw,24px); color:#ffffff !important; font-weight:600;
  font-variant-numeric:tabular-nums; font-family:-apple-system,system-ui,sans-serif;
}
.pi.active .pi-name { color:#ff453a !important; }
.pi.active .pi-time { color:#ff453a !important; }
.pi.sr .pi-name { color:#FFD60A !important; }
.pi.sr .pi-time { color:#FFD60A !important; }
#cal-badge {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-width:44px; padding:2px 8px;
  border-right:1px solid rgba(0,229,255,0.25); margin-right:4px;
}
#cal-badge-day {
  font-size:clamp(20px,18vw,22px); font-weight:700; color:#ff453a;
  font-family:-apple-system,system-ui,sans-serif; line-height:1;
  font-variant-numeric:tabular-nums;
  text-shadow:0 1.3px 3.9px rgba(0,0,0,0.65),0 2.6px 10.4px rgba(0,0,0,0.455);

  letter-spacing:0.5px; line-height:1.2;
  text-shadow:0 1.3px 3.9px rgba(0,0,0,0.65),0 2.6px 10.4px rgba(0,0,0,0.455);

// ── Wake Lock: экран не выключается ──
(function(){
  let wakeLock = null;
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch(e) {}
    }
  }
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible') await requestWakeLock();
  });
  requestWakeLock();
})();
</script>

  return{day:hDay,month:hMonth,year:hYear};
}
// ── Islamic Events System ──────────────────────────────────────
function getHijriForDisplay(date) {
  // Hijri day changes after Maghrib ENDS (7-min window)
  const now = new Date(date.getTime());
  const key = pad(now.getMonth()+1)+'-'+pad(now.getDate());
  const row = P[key]||P['02-28'];
  const [mh,mm] = row['M'].split(':').map(Number);
  const maghribToday = new Date(now); maghribToday.setHours(mh,mm,0,0);
  const maghribEnds = new Date(maghribToday.getTime() + 7*60*1000);
  const hijriDate = now >= maghribEnds ? new Date(now.getTime()+86400000) : now;
  return toHijri(hijriDate);
}

function getIslamicEvents(hDay, hMonth, hYear, weekday) {
  const ev = [];
  // ── Muharram ──
  if (hMonth===1) {
    if (hDay===1)  ev.push({p:10, t:'🌙 Исламский Новый '+hYear+' год',     g:true});
    if (hDay===9)  ev.push({p:8,  t:'☪️ Пост накануне Ашура',               g:false});
    if (hDay===10) ev.push({p:9,  t:'⭐ Ашура — пост желателен',            g:true});
    if (hDay===11) ev.push({p:7,  t:'☪️ Пост после Ашура',                  g:false});
  }
  // ── Раби аль-Авваль ──
  if (hMonth===3 && hDay===12) ev.push({p:9, t:'🌹 Ан-Наби ﷺ', g:true});
  // ── Раджаб ──
  if (hMonth===7) {
    if (hDay===1)  ev.push({p:6, t:'🌙 Начало Раджаба', g:false});
    if (hDay===27) ev.push({p:9, t:"✨ Исра вальМи'радж", g:true});
  }
  // ── Шаабан ──
  if (hMonth===8 && hDay===15) ev.push({p:8, t:'🌕 Нисф Шаабан', g:true});
  // ── Рамадан ──
  if (hMonth===9) {
    if (hDay===1) ev.push({p:10, t:'🌙 Начало Рамадана!', g:true});
    else if (hDay>=21 && hDay%2===1) ev.push({p:9, t:'✨ Поиск Ночи Предопределения', g:true});
    else ev.push({p:10, t:'🌙 Рамадан — '+hDay+'-й день поста', g:true});
  }
  // ── Шавваль ──
  if (hMonth===10) {
    if (hDay===1) ev.push({p:10, t:'🎉 Ид аль-Фитр — Ураза-Байрам!', g:true});
    if (hDay>=2 && hDay<=7) ev.push({p:8, t:'☪️ Пост Шавваля — '+(hDay-1)+'-й из 6 дней', g:false});
  }
  // ── Зуль-Хиджа ──
  if (hMonth===12) {
    if (hDay>=1 && hDay<=8) ev.push({p:9, t:'☪️ Пост Зуль-Хиджа ('+hDay+'-й день)', g:true});
    if (hDay===9) ev.push({p:10, t:'🤲 День Арафа — пост за два года!', g:true});
    if (hDay===10) ev.push({p:10, t:'🐑 Ид аль-Адха(Пост запрещен)', g:true});
    if (hDay>=11 && hDay<=13) ev.push({p:8, t:'🕋 Дни ат-Ташрик(Пост запрещен)', g:false});
  }
  // ── Священные месяцы (Зуль-Каада) ──
  if (hMonth===11 && hDay===1) ev.push({p:5, t:'🌙 Начало Зуль-Каада', g:false});
  // ── Белые дни (13,14,15 кроме 1 Шавваль) ──
  if ([13,14,15].includes(hDay) && hMonth!==9 && !(hMonth===10&&hDay===1)) {
    ev.push({p:6, t:'🌕 Белые дни — '+(hDay-12)+'-й день (пост сунна)', g:false});
  }
  // ── Еженедельные посты ──
  if (weekday===1) ev.push({p:4, t:'🌴 Пост в Понедельник (сунна)', g:false});
  if (weekday===4) ev.push({p:4, t:'🌴 Пост в Четверг (сунна)',     g:false});

  ev.sort((a,b)=>b.p-a.p);
  return ev.slice(0,2);
}

function updateIslamicEvent(now) {
  const h = getHijriForDisplay(now);
  const weekday = now.getDay(); // 0=вс,1=пн,...,4=чт
  const events = getIslamicEvents(h.day, h.month, h.year, weekday);
  const el = document.getElementById('islamic-event');
  if (!el) return;
  const monthName = HIJRI_MONTHS[h.month - 1] || '';
  const dateHtml = '<span class="ev-line gold"><span class="hijri-day-num">' + h.day + '</span> ' + monthName + ' ' + h.year + '</span>';
  if (events.length === 0) {
    el.innerHTML = dateHtml;
  } else {
    el.innerHTML = dateHtml + events.map(e =>
      '<span class="ev-line '+(e.g?'gold':'white')+'">'+e.t+'</span>'
    ).join('');
  }
}

const NAMES=['Фаджр','Зухр','Аср','Магриб','Иша'];
const KEYS=['F','Z','A','M','I'];
const WINS={"Фаджр":30*60,"Магриб":7*60};
const DEFAULT_WIN=15*60;
const DUHA_DELAY=25*60;

function pad(n){return String(n).padStart(2,'0');}
function getKey(d){return pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function getPrayers(date){const row=P[getKey(date)]||P['02-28'];return KEYS.map((c,i)=>{const[h,m]=row[c].split(':').map(Number);const t=new Date(date);t.setHours(h,m,0,0);return{name:NAMES[i],time:t};});}
function getSunrise(date){const s=SR[getKey(date)]||SR['02-28'];const[h,m]=s.split(':').map(Number);const t=new Date(date);t.setHours(h,m,0,0);return t;}

function compute(){
  const now=new Date(),ms=now.getTime(),prayers=getPrayers(now);
  const sunrise=getSunrise(now),srMs=sunrise.getTime(),duhaMs=srMs+DUHA_DELAY*1000;
  for(let i=0;i<prayers.length;i++){
    const pms=prayers[i].time.getTime(),diff=ms-pms;
    const win=(WINS[prayers[i].name]||DEFAULT_WIN);
    if(diff>=0&&diff<win*1000) return{state:'active',prayers,cur:prayers[i],nxt:prayers[i+1]||null,rem:win-Math.floor(diff/1000),sunrise};
    if(pms>ms){
      if(prayers[i].name==='Зухр'){
        if(ms<srMs) return{state:'countdown',prayers,nxt:{name:'Восход',time:sunrise},rem:Math.floor((srMs-ms)/1000),sunrise};
        if(ms<duhaMs) return{state:'duha',prayers,rem:Math.floor((duhaMs-ms)/1000),sunrise};
      }
      return{state:'countdown',prayers,nxt:prayers[i],rem:Math.floor((pms-ms)/1000),sunrise};
    }
  }
  const tom=new Date(now);tom.setDate(tom.getDate()+1);
  const fajr=getPrayers(tom)[0];
  return{state:'countdown',prayers,nxt:fajr,rem:Math.floor((fajr.time.getTime()-ms)/1000),sunrise};
}

function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?pad(h)+':'+pad(m)+':'+pad(sec):pad(m)+':'+pad(sec);}
function fmtT(d){return pad(d.getHours())+':'+pad(d.getMinutes());}

const $ct=document.getElementById('current-time');
// islamic event element updated via updateIslamicEvent()
const $t=document.getElementById('timer');
const $n=document.getElementById('prayer-name');
const $pt=document.getElementById('prayer-time-display');
const $st=document.getElementById('status-label');
const $b=document.getElementById('bottom-row');

function renderBottom(prayers,nxt,cur,sunrise){
  $b.innerHTML='';const ms=Date.now();
  const items=[prayers[0],{name:'Восход',time:sunrise,isSr:true},...prayers.slice(1)];
  items.forEach(p=>{
    const d=document.createElement('div');d.className='pi';
    if(p.isSr)d.classList.add('sr');
    const isA=cur&&cur.name===p.name,isN=nxt&&nxt.name===p.name&&!cur;
    const isDone=p.time.getTime()<Date.now()&&!isA;
    if(isA||isN)d.classList.add('active');
    if(isDone&&!isA)d.classList.add('done');
    d.innerHTML='<span class="pi-name">'+p.name+'</span><span class="pi-time">'+fmtT(p.time)+'</span>';
    $b.appendChild(d);
  });
}

function tick(){
  const now=new Date();
  $ct.textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  updateIslamicEvent(now);
  const s=compute();
  if(s.state==='active'){
    $t.textContent=fmt(s.rem);$t.className='red';
    $n.textContent=s.cur.name.toUpperCase();$n.className='red';
    $st.textContent='';$pt.textContent=fmtT(s.cur.time);
    renderBottom(s.prayers,null,s.cur,s.sunrise);
  } else if(s.state==='duha'){
    $t.textContent=fmt(s.rem);$t.className='red';
    $n.textContent='ДУХА';$n.className='red';
    $st.textContent='';$pt.textContent='';
    renderBottom(s.prayers,null,null,s.sunrise);
  } else {
    $t.textContent=fmt(s.rem);$t.className='green';
    $n.textContent=s.nxt?s.nxt.name.toUpperCase():'';$n.className='green';
    $st.textContent='';$pt.textContent=s.nxt?fmtT(s.nxt.time):'';
    renderBottom(s.prayers,s.nxt,null,s.sunrise);
  }
}

tick();setInterval(tick,1000);
document.addEventListener('click',(e)=>{
  if(e.target.tagName==='BUTTON') return;
  if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();
});
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>

<script>
(function() {
  const HADITHS = [

  ];

  // Определить текущий слот намаза (0=Фаджр, 1=Зухр, 2=Аср, 3=Магриб, 4=Иша)
  function getPrayerSlot(date) {
    const prayers = getPrayers(date);
    const ms = date.getTime();
    for (let i = prayers.length - 1; i >= 0; i--) {
      if (ms >= prayers[i].time.getTime()) return i;
    }
    return 4; // до Фаджра — всё ещё слот Иша
  }

  function getSecondsUntilNextPrayer(date) {
    const prayers = getPrayers(date);
    const ms = date.getTime();
    for (let i = 0; i < prayers.length; i++) {
      if (prayers[i].time.getTime() > ms)
        return Math.floor((prayers[i].time.getTime() - ms) / 1000);
    }
    // После Иша — до Фаджра следующего дня
    const tom = new Date(date); tom.setDate(tom.getDate() + 1);
    const fajr = getPrayers(tom)[0];
    return Math.floor((fajr.time.getTime() - ms) / 1000);
  }

  function getNextPrayerName(date) {
    const names = ['Фаджр','Зухр','Аср','Магриб','Иша'];
    const prayers = getPrayers(date);
    const ms = date.getTime();
    for (let i = 0; i < prayers.length; i++) {
      if (prayers[i].time.getTime() > ms) return names[i];
    }
    return 'Фаджр';
  }

  function fmtTimer(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    const p = n => String(n).padStart(2, '0');
    return h > 0 ? p(h)+':'+p(m)+':'+p(sec) : p(m)+':'+p(sec);
  }

  function getHadithIndex(date) {
    const startOfYear = new Date(date.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((date - startOfYear) / 86400000);
    const slot = getPrayerSlot(date);
    return (dayOfYear * 5 + slot) % HADITHS.length;
  }

  // Создаём блок хадиса
  let currentHadithIdx = -1;
  const hadithBlock = document.createElement('div');




    '</div>';

  const frameBox = document.querySelector('.frame-box');
  if (frameBox) {
    const topRow = document.createElement('div');
    topRow.id = 'top-calendar-row';
    const daysOfWeek = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];
    const orderedIndices = [1,2,3,4,5,6,0];
    orderedIndices.forEach(idx => {
      const dayDiv = document.createElement('div');
      dayDiv.className = 'cal-day';
      dayDiv.setAttribute('data-day-idx', idx);
      dayDiv.innerHTML = '<span class="pi-name">'+daysOfWeek[idx]+'</span>';
      topRow.appendChild(dayDiv);
    });
    const batDiv = document.createElement('div');
    batDiv.className = 'cal-day battery-box';
    batDiv.innerHTML = '<span class="pi-name"></span><span class="pi-time" id="ext-bat-val">...</span>';
    topRow.appendChild(batDiv);
    frameBox.insertBefore(topRow, frameBox.firstChild);
    frameBox.insertBefore(hadithBlock, document.getElementById('notepad-block'));
  }

  function playNokia() {
    try {
      const audio = document.getElementById('nokia-sms');
      if (audio) { audio.volume = 1.0; audio.currentTime = 0; audio.play().catch(() => {}); }
    } catch(e) {}
  }
  function playThreeBeeps() { playNokia(); }
  document.addEventListener('click', () => {
    const audio = document.getElementById('nokia-sms');
    if (audio) { audio.volume = 1.0; }
  }, { once: false });

  let lastState = null, lastPrayerName = null;

  function updateExtensions() {
    const now = new Date(), currentDayIdx = now.getDay();
    document.querySelectorAll('.cal-day[data-day-idx]').forEach(el => {
      parseInt(el.getAttribute('data-day-idx')) === currentDayIdx
        ? el.classList.add('current') : el.classList.remove('current');
    });

    // Дата в ячейке батареи
    const el = document.getElementById('ext-bat-val');
    if (el) {
      const MONTHS_RU=['ЯНВ','ФЕВ','МАР','АПР','МАЙ','ИЮН','ИЮЛ','АВГ','СЕН','ОКТ','НОЯ','ДЕК'];
      el.textContent = now.getDate() + ' ' + MONTHS_RU[now.getMonth()];
    }

    // Обновление хадиса по слоту намаза
    const idx = getHadithIndex(now);
    const timerEl = document.getElementById('hadith-timer-val');
    if (timerEl) {
      const secs = getSecondsUntilNextPrayer(now);
      timerEl.textContent = fmtTimer(secs);
    }
    if (idx !== currentHadithIdx) {
      currentHadithIdx = idx;
      const h = HADITHS[idx];
      const textEl = document.getElementById('hadith-text');
      const srcEl  = document.getElementById('hadith-source');
      if (textEl) textEl.textContent = h.t;
      if (srcEl)  srcEl.textContent  = h.s;
    }

    if (typeof compute === 'function') {
      const s = compute();
      if (s && s.state === 'active' && s.cur) {
        if (lastState !== 'active' || lastPrayerName !== s.cur.name) playThreeBeeps();
        lastPrayerName = s.cur.name;
      } else {
        if (lastState === 'active') playThreeBeeps();
        lastPrayerName = null;
      }
      if (s) lastState = s.state;
    }
  }
  setInterval(updateExtensions, 1000);
  setTimeout(updateExtensions, 100);
})();
</script>

<script>
(function(){
  var el = document.getElementById('battery-status');
  if (!el) return;

  function getBatColor(pct, charging) {
    if (charging) return '#30d158';
    if (pct <= 20) return '#ff453a';
    if (pct <= 40) return '#FFD60A';
    return 'rgba(255,255,255,0.75)';
  }

  function renderBattery(pct, charging) {
    if (!el) return;
    var p = Math.round(pct * 100);
    var color = getBatColor(p, charging);
    el.className = '';
    if (charging) el.classList.add('bat-full');
    else if (p <= 20) el.classList.add('bat-low');
    else if (p <= 40) el.classList.add('bat-mid');
    else el.classList.add('bat-ok');

    var fillW = Math.max(0, Math.min(12, Math.round(p / 100 * 12)));
    var chargingSymbol = charging ? '⚡' : '';
    el.style.flexDirection = 'column';
    el.style.alignItems = 'center';
    el.style.gap = '2px';
    el.innerHTML =
      '<svg viewBox="0 0 18 10" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:36px;height:20px;flex-shrink:0;">' +

        '<rect x="15.5" y="3" width="2" height="4" rx="1" fill="' + color + '"/>' +
        '<rect x="1.5" y="1.5" width="' + fillW + '" height="7" rx="1.5" fill="' + color + '"/>' +
      '</svg>' +
      '<span style="color:' + color + ';font-size:clamp(10px,6vw,14px);font-weight:700;line-height:1;">' + p + '%' + chargingSymbol + '</span>';
  }

  if ('getBattery' in navigator) {
    navigator.getBattery().then(function(bat) {
      renderBattery(bat.level, bat.charging);
      bat.addEventListener('levelchange',   function(){ renderBattery(bat.level, bat.charging); });
      bat.addEventListener('chargingchange',function(){ renderBattery(bat.level, bat.charging); });
    }).catch(function(){
      el.style.display = 'none';
    });
  } else {
    el.style.display = 'none';
  }
})();
</script>

(function(){
  var TA = document.getElementById('notepad-textarea');
  var hint = document.getElementById('notepad-saved-hint');
  var saved = localStorage.getItem('notepad_text') || '';
  if (TA) TA.value = saved;
  var saveTimer = null;
  window.notepadSave = function(){
    if (!TA) return;
    clearTimeout(saveTimer);
    hint.textContent = '';
    saveTimer = setTimeout(function(){
      localStorage.setItem('notepad_text', TA.value);
      hint.style.opacity = '1';
      hint.textContent = '✓ Сохранено';
      setTimeout(function(){ hint.style.opacity = '0'; }, 1500);
    }, 600);
  };
  window.notepadClear = function(){
    if (!TA) return;
    TA.value = '';
    localStorage.removeItem('notepad_text');
    hint.style.opacity = '1';
    hint.textContent = 'Очищено';
    setTimeout(function(){ hint.style.opacity = '0'; }, 1500);
  };
})();


</script>

</body>
</html>
